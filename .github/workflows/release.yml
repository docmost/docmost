name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.25.3)"
        required: true
      target_repository:
        description: "Mirror GitHub repository in owner/name format"
        required: false

permissions:
  contents: write

env:
  VERSION: ${{ inputs.version || github.ref_name }}
  TARGET_REPOSITORY: ${{ inputs.target_repository || vars.GITHUB_MIRROR_REPOSITORY }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate configuration
        run: |
          if [ -z "${TARGET_REPOSITORY}" ]; then
            echo "vars.GITHUB_MIRROR_REPOSITORY is not set and no workflow_dispatch target_repository was provided."
            exit 1
          fi
          if [ -z "${{ secrets.GITHUB_MIRROR_TOKEN }}" ]; then
            echo "secrets.GITHUB_MIRROR_TOKEN is not set."
            exit 1
          fi

      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Ensure tag exists for manual runs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists locally."
          else
            git tag "${VERSION}" "${GITHUB_SHA}"
            echo "Created tag ${VERSION} from ${GITHUB_SHA}."
          fi

      - name: Configure mirror remote
        run: |
          git remote add mirror "https://x-access-token:${{ secrets.GITHUB_MIRROR_TOKEN }}@github.com/${TARGET_REPOSITORY}.git"
          git remote -v

      - name: Push branches to mirror
        run: git push mirror 'refs/heads/*:refs/heads/*'

      - name: Push tags to mirror
        run: git push mirror 'refs/tags/*:refs/tags/*'

      - name: Create or update GitHub release in mirror
        env:
          GH_TOKEN: ${{ secrets.GITHUB_MIRROR_TOKEN }}
        run: |
          if gh release view "${VERSION}" --repo "${TARGET_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${VERSION}" \
              --repo "${TARGET_REPOSITORY}" \
              --title "${VERSION}" \
              --notes "Release ${VERSION}"
          else
            gh release create "${VERSION}" \
              --repo "${TARGET_REPOSITORY}" \
              --title "${VERSION}" \
              --generate-notes
          fi
