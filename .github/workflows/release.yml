name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.25.3)"
        required: true
      target_repository:
        description: "Mirror GitHub repository in owner/name format"
        required: false

permissions:
  contents: write
  packages: write

env:
  VERSION: ${{ inputs.version || github.ref_name }}
  TARGET_REPOSITORY: ${{ inputs.target_repository || github.repository }}
  RELEASE_TOKEN: ${{ secrets.GITHUB_MIRROR_TOKEN || github.token }}
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate configuration
        run: |
          if [ -z "${TARGET_REPOSITORY}" ]; then
            echo "Unable to determine target repository."
            exit 1
          fi

      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Ensure tag exists for manual runs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if git rev-parse "${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists locally."
          else
            git tag "${VERSION}" "${GITHUB_SHA}"
            echo "Created tag ${VERSION} from ${GITHUB_SHA}."
          fi

      - name: Configure mirror remote
        run: |
          git remote add mirror "https://x-access-token:${RELEASE_TOKEN}@github.com/${TARGET_REPOSITORY}.git"
          git remote -v

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ !contains(env.VERSION, '-') }}
            type=raw,value=${{ env.VERSION }}
            type=raw,value=${{ github.ref_name }}
            type=sha

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push branches to mirror
        run: git push mirror 'refs/heads/*:refs/heads/*'

      - name: Push release tag to mirror
        run: |
          local_commit="$(git rev-list -n 1 "${VERSION}")"
          remote_tag_object="$(git ls-remote --tags mirror "refs/tags/${VERSION}" | awk '{print $1}')"
          remote_tag_commit="$(git ls-remote --tags mirror "refs/tags/${VERSION}^{}" | awk '{print $1}')"

          if [ -z "${remote_tag_object}" ]; then
            git push mirror "refs/tags/${VERSION}:refs/tags/${VERSION}"
            exit 0
          fi

          remote_commit="${remote_tag_commit:-$remote_tag_object}"

          if [ "${local_commit}" = "${remote_commit}" ]; then
            echo "Tag ${VERSION} already exists on ${TARGET_REPOSITORY} and points to the same commit. Skipping push."
            exit 0
          fi

          echo "Tag ${VERSION} already exists on ${TARGET_REPOSITORY}, but points to a different commit."
          echo "Local commit:  ${local_commit}"
          echo "Remote commit: ${remote_commit}"
          exit 1

      - name: Create or update GitHub release in mirror
        env:
          GH_TOKEN: ${{ env.RELEASE_TOKEN }}
        run: |
          if gh release view "${VERSION}" --repo "${TARGET_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${VERSION}" \
              --repo "${TARGET_REPOSITORY}" \
              --title "${VERSION}" \
              --notes "Release ${VERSION}"
          else
            gh release create "${VERSION}" \
              --repo "${TARGET_REPOSITORY}" \
              --title "${VERSION}" \
              --generate-notes
          fi
