services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: docmost_dev_pass
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docmost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data_dev:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: docmost_dev
      MINIO_ROOT_PASSWORD: docmost_dev_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    volumes:
      - minio_data_dev:/data

volumes:
  db_data_dev:
  redis_data_dev:
  minio_data_dev:
